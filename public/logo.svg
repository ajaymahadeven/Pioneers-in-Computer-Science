<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Flat charcoal background -->
  <rect width="512" height="512" rx="96" fill="#1a1a1a"/>

  <!-- Sketchbook dot-grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1.5" fill="#ffffff" fill-opacity="0.08"/>
  </pattern>
  <rect width="512" height="512" rx="96" fill="url(#dots)"/>

  <!-- Bold P letterform -->
  <text
    x="256"
    y="296"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="280"
    font-weight="700"
    fill="#f0ede8"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-8"
  >P</text>

  <!-- Thin baseline rule -->
  <line x1="112" y1="372" x2="400" y2="372" stroke="#f0ede8" stroke-width="6" stroke-linecap="round" stroke-opacity="0.25"/>
</svg>
